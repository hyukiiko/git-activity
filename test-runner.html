<!DOCTYPE html>
<html>
<head>
  <title>Test Runner</title>
</head>
<body>
  <h1>Test Results</h1>
  <pre id="results"></pre>
  <script src="test.js"></script>
  <script>
    try {
      const results = testHTML();
      const output = results.map(r => `${r.status.toUpperCase()}: ${r.message}`).join('\n');
      document.getElementById('results').textContent = output;
      console.log(output);
    } catch (e) {
      document.getElementById('results').textContent = e.message;
      console.error(e.message);
    }
  </script>
</body>
</html>
